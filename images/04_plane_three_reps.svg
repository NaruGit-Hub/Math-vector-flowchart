<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 200" width="540" height="200">

<style>
  .axis { stroke: #000; stroke-width: 1; fill: none; }
  .vec  { stroke: #000; stroke-width: 1.5; fill: none; }
  .vec-thin { stroke: #555; stroke-width: 1; fill: none; }
  .dashed { stroke: #555; stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
  .ftxt { font-family: 'Times New Roman', serif; font-style: italic; font-size: 14px; fill: #000; }
  .label { font-family: 'Hiragino Sans', sans-serif; font-size: 12px; fill: #000; }
  .pt { fill: #000; }
  .filled { fill: #ddd; stroke: #000; stroke-width: 1; }
  .filled-light { fill: #eee; stroke: #000; stroke-width: 1; }
  .right-angle { stroke: #000; stroke-width: 1; fill: none; }
</style>


<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="7" markerHeight="7" orient="auto">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
  </marker>
  <marker id="arrowgray" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="6" markerHeight="6" orient="auto">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
  </marker>
</defs>

<polygon points="90,130 40,70 140,60" fill="#f0f0f0" stroke="#000"/>
<circle cx="90.0" cy="130.0" r="3" class="pt"/>
<circle cx="40.0" cy="70.0" r="3" class="pt"/>
<circle cx="140.0" cy="60.0" r="3" class="pt"/>
<text x="75.0" y="135.0" class="label">A</text>
<text x="25.0" y="65.0" class="label">B</text>
<text x="145.0" y="55.0" class="label">C</text>
<text x="40.0" y="175.0" class="label">(1) 3点を通る</text>
<polygon points="270,130 220,70 270,0 320,60" fill="#f0f0f0" stroke="#000"/>
<line x1="270.0" y1="130.0" x2="220.0" y2="70.0" class="vec" marker-end="url(#arrow)"/>
<line x1="270.0" y1="130.0" x2="320.0" y2="60.0" class="vec" marker-end="url(#arrow)"/>
<circle cx="270.0" cy="130.0" r="3" class="pt"/>
<text x="255.0" y="135.0" class="label">A</text>
<text x="227.0" y="100.0" class="ftxt">u</text>
<text x="300.0" y="95.0" class="ftxt">v</text>
<text x="220.0" y="175.0" class="label">(2) 1点と2方向</text>
<polygon points="420,150 500,140 510,110 430,120" fill="#f0f0f0" stroke="#000"/>
<line x1="460.0" y1="130.0" x2="480.0" y2="70.0" class="vec" marker-end="url(#arrow)"/>
<circle cx="460.0" cy="130.0" r="3" class="pt"/>
<text x="447.0" y="125.0" class="label">A</text>
<text x="485.0" y="90.0" class="ftxt">n</text>
<text x="410.0" y="175.0" class="label">(3) 1点と法線</text>
</svg>