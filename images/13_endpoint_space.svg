<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 220" width="560" height="220">

<style>
  .axis { stroke: #000; stroke-width: 1; fill: none; }
  .vec  { stroke: #000; stroke-width: 1.5; fill: none; }
  .vec-thin { stroke: #555; stroke-width: 1; fill: none; }
  .dashed { stroke: #555; stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
  .ftxt { font-family: 'Times New Roman', serif; font-style: italic; font-size: 14px; fill: #000; }
  .label { font-family: 'Hiragino Sans', sans-serif; font-size: 12px; fill: #000; }
  .pt { fill: #000; }
  .filled { fill: #ddd; stroke: #000; stroke-width: 1; }
  .filled-light { fill: #eee; stroke: #000; stroke-width: 1; }
  .right-angle { stroke: #000; stroke-width: 1; fill: none; }
</style>


<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="7" markerHeight="7" orient="auto">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
  </marker>
  <marker id="arrowgray" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="6" markerHeight="6" orient="auto">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
  </marker>
</defs>

<rect x="30" y="50" width="100" height="100" fill="#eee" stroke="none"/>
<line x1="60.0" y1="140.0" x2="125.0" y2="130.0" class="vec-thin" marker-end="url(#arrowgray)"/>
<line x1="60.0" y1="140.0" x2="100.0" y2="100.0" class="vec-thin" marker-end="url(#arrowgray)"/>
<line x1="60.0" y1="140.0" x2="70.0" y2="55.0" class="vec-thin" marker-end="url(#arrowgray)"/>
<circle cx="60.0" cy="140.0" r="3" class="pt"/>
<circle cx="125.0" cy="130.0" r="3" class="pt"/>
<circle cx="100.0" cy="100.0" r="3" class="pt"/>
<circle cx="70.0" cy="55.0" r="3" class="pt"/>
<text x="45.0" y="145.0" class="label">O</text>
<text x="30.0" y="180.0" class="label">①l,m,nが実数全体</text>
<text x="38.0" y="198.0" class="label">→ 全空間</text>
<polygon points="255,130 230,100 200,55" fill="#ddd" stroke="#000"/>
<line x1="190.0" y1="140.0" x2="255.0" y2="130.0" class="vec-thin" marker-end="url(#arrowgray)"/>
<line x1="190.0" y1="140.0" x2="230.0" y2="100.0" class="vec-thin" marker-end="url(#arrowgray)"/>
<line x1="190.0" y1="140.0" x2="200.0" y2="55.0" class="vec-thin" marker-end="url(#arrowgray)"/>
<circle cx="190.0" cy="140.0" r="3" class="pt"/>
<circle cx="255.0" cy="130.0" r="3" class="pt"/>
<circle cx="230.0" cy="100.0" r="3" class="pt"/>
<circle cx="200.0" cy="55.0" r="3" class="pt"/>
<text x="175.0" y="145.0" class="label">O</text>
<text x="160.0" y="180.0" class="label">②l+m+n=1</text>
<text x="168.0" y="198.0" class="label">→ 平面ABC</text>
<polygon points="385,130 360,100 330,55" fill="#ddd" stroke="#000"/>
<line x1="320.0" y1="140.0" x2="385.0" y2="130.0" class="vec-thin" marker-end="url(#arrowgray)"/>
<line x1="320.0" y1="140.0" x2="360.0" y2="100.0" class="vec-thin" marker-end="url(#arrowgray)"/>
<line x1="320.0" y1="140.0" x2="330.0" y2="55.0" class="vec-thin" marker-end="url(#arrowgray)"/>
<circle cx="320.0" cy="140.0" r="3" class="pt"/>
<circle cx="385.0" cy="130.0" r="3" class="pt"/>
<circle cx="360.0" cy="100.0" r="3" class="pt"/>
<circle cx="330.0" cy="55.0" r="3" class="pt"/>
<text x="305.0" y="145.0" class="label">O</text>
<text x="290.0" y="180.0" class="label">③l+m+n=1,各≧0</text>
<text x="298.0" y="198.0" class="label">→ △ABC周+内部</text>
<polygon points="450,140 515,130 490,100" fill="#ddd" stroke="#000"/>
<polygon points="450,140 490,100 460,55" fill="#ccc" stroke="#000"/>
<polygon points="450,140 515,130 460,55" fill="#bbb" stroke="#000"/>
<line x1="450.0" y1="140.0" x2="515.0" y2="130.0" class="vec-thin" marker-end="url(#arrowgray)"/>
<line x1="450.0" y1="140.0" x2="490.0" y2="100.0" class="vec-thin" marker-end="url(#arrowgray)"/>
<line x1="450.0" y1="140.0" x2="460.0" y2="55.0" class="vec-thin" marker-end="url(#arrowgray)"/>
<circle cx="450.0" cy="140.0" r="3" class="pt"/>
<circle cx="515.0" cy="130.0" r="3" class="pt"/>
<circle cx="490.0" cy="100.0" r="3" class="pt"/>
<circle cx="460.0" cy="55.0" r="3" class="pt"/>
<text x="435.0" y="145.0" class="label">O</text>
<text x="420.0" y="180.0" class="label">④l+m+n≦1,各≧0</text>
<text x="428.0" y="198.0" class="label">→ 四面体周+内部</text>
</svg>