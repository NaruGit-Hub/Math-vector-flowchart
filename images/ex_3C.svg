<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="320" height="220">

<style>
  .axis { stroke: #000; stroke-width: 1; fill: none; }
  .vec  { stroke: #000; stroke-width: 1.5; fill: none; }
  .vec-thin { stroke: #555; stroke-width: 1; fill: none; }
  .dashed { stroke: #555; stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
  .ftxt { font-family: 'Times New Roman', serif; font-style: italic; font-size: 14px; fill: #000; }
  .label { font-family: 'Hiragino Sans', sans-serif; font-size: 12px; fill: #000; }
  .pt { fill: #000; }
  .filled { fill: #ddd; stroke: #000; stroke-width: 1; }
  .filled-light { fill: #eee; stroke: #000; stroke-width: 1; }
  .right-angle { stroke: #000; stroke-width: 1; fill: none; }
</style>


<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="7" markerHeight="7" orient="auto">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
  </marker>
  <marker id="arrowgray" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="6" markerHeight="6" orient="auto">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
  </marker>
</defs>

<polygon points="160.0,190.0 260.0,190.0 180.0,50.0 120.0,120.0" fill="#ddd" stroke="#000" stroke-width="1.5"/>
<line x1="60.0" y1="190.0" x2="260.0" y2="190.0" class="vec" marker-end="url(#arrow)"/>
<line x1="60.0" y1="190.0" x2="180.0" y2="50.0" class="vec" marker-end="url(#arrow)"/>
<circle cx="60.0" cy="190.0" r="3" class="pt"/>
<circle cx="260.0" cy="190.0" r="3" class="pt"/>
<circle cx="180.0" cy="50.0" r="3" class="pt"/>
<circle cx="160.0" cy="190.0" r="2.5" class="pt"/>
<circle cx="120.0" cy="120.0" r="2.5" class="pt"/>
<text x="45.0" y="195.0" class="label">O</text>
<text x="265.0" y="195.0" class="label">A</text>
<text x="175.0" y="42.0" class="label">B</text>
<text x="155.0" y="208.0" class="label">A/2</text>
<text x="90.0" y="123.0" class="label">B/2</text>
<text x="60.0" y="210.0" class="label">P の動く範囲（網掛け部）</text>
</svg>