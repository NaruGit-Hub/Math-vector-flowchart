<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 200" width="360" height="200">

<style>
  .axis { stroke: #000; stroke-width: 1; fill: none; }
  .vec  { stroke: #000; stroke-width: 1.5; fill: none; }
  .vec-thin { stroke: #555; stroke-width: 1; fill: none; }
  .dashed { stroke: #555; stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
  .ftxt { font-family: 'Times New Roman', serif; font-style: italic; font-size: 14px; fill: #000; }
  .label { font-family: 'Hiragino Sans', sans-serif; font-size: 12px; fill: #000; }
  .pt { fill: #000; }
  .filled { fill: #ddd; stroke: #000; stroke-width: 1; }
  .filled-light { fill: #eee; stroke: #000; stroke-width: 1; }
  .right-angle { stroke: #000; stroke-width: 1; fill: none; }
</style>


<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="7" markerHeight="7" orient="auto">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
  </marker>
  <marker id="arrowgray" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="6" markerHeight="6" orient="auto">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
  </marker>
</defs>

<line x1="40.0" y1="160.0" x2="320.0" y2="160.0" class="vec" marker-end="url(#arrow)"/>
<line x1="40.0" y1="160.0" x2="240.0" y2="50.0" class="vec" marker-end="url(#arrow)"/>
<line x1="40.0" y1="160.0" x2="240.0" y2="160.0" class="vec" marker-end="url(#arrow)"/>
<line x1="240.0" y1="50.0" x2="240.0" y2="160.0" class="dashed"/>
<polyline points="240.0,152.0 232.0,152.0 232.0,160.0" class="right-angle"/>
<circle cx="40.0" cy="160.0" r="3" class="pt"/>
<circle cx="320.0" cy="160.0" r="3" class="pt"/>
<circle cx="240.0" cy="50.0" r="3" class="pt"/>
<circle cx="240.0" cy="160.0" r="3" class="pt"/>
<text x="25.0" y="165.0" class="label">O</text>
<text x="325.0" y="165.0" class="label">A</text>
<text x="235.0" y="42.0" class="label">B</text>
<text x="235.0" y="178.0" class="label">H</text>
<text x="170.0" y="178.0" class="ftxt">a</text>
<text x="130.0" y="100.0" class="ftxt">b</text>
<text x="135.0" y="152.0" class="ftxt">OH</text>
</svg>