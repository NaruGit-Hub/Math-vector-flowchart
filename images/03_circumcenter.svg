<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 260" width="320" height="260">

<style>
  .axis { stroke: #000; stroke-width: 1; fill: none; }
  .vec  { stroke: #000; stroke-width: 1.5; fill: none; }
  .vec-thin { stroke: #555; stroke-width: 1; fill: none; }
  .dashed { stroke: #555; stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
  .ftxt { font-family: 'Times New Roman', serif; font-style: italic; font-size: 14px; fill: #000; }
  .label { font-family: 'Hiragino Sans', sans-serif; font-size: 12px; fill: #000; }
  .pt { fill: #000; }
  .filled { fill: #ddd; stroke: #000; stroke-width: 1; }
  .filled-light { fill: #eee; stroke: #000; stroke-width: 1; }
  .right-angle { stroke: #000; stroke-width: 1; fill: none; }
</style>


<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="7" markerHeight="7" orient="auto">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
  </marker>
  <marker id="arrowgray" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="6" markerHeight="6" orient="auto">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
  </marker>
</defs>

<circle cx="160.0" cy="170.0" r="111.8" fill="none" stroke="#888" stroke-width="1"/>
<line x1="60.0" y1="220.0" x2="260.0" y2="220.0" class="vec-thin"/>
<line x1="260.0" y1="220.0" x2="180.0" y2="60.0" class="vec-thin"/>
<line x1="180.0" y1="60.0" x2="60.0" y2="220.0" class="vec-thin"/>
<line x1="160.0" y1="220.0" x2="160.0" y2="170.0" class="dashed"/>
<line x1="220.0" y1="140.0" x2="160.0" y2="170.0" class="dashed"/>
<line x1="120.0" y1="140.0" x2="160.0" y2="170.0" class="dashed"/>
<circle cx="60.0" cy="220.0" r="3" class="pt"/>
<circle cx="260.0" cy="220.0" r="3" class="pt"/>
<circle cx="180.0" cy="60.0" r="3" class="pt"/>
<circle cx="160.0" cy="170.0" r="3" class="pt"/>
<circle cx="160.0" cy="220.0" r="2" class="pt"/>
<circle cx="220.0" cy="140.0" r="2" class="pt"/>
<circle cx="120.0" cy="140.0" r="2" class="pt"/>
<text x="48.0" y="225.0" class="label">A</text>
<text x="265.0" y="225.0" class="label">B</text>
<text x="175.0" y="55.0" class="label">C</text>
<text x="166.0" y="175.0" class="label">R</text>
<text x="155.0" y="238.0" class="label">M</text>
