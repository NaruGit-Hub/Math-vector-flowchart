<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 220" width="560" height="220">

<style>
  .axis { stroke: #000; stroke-width: 1; fill: none; }
  .vec  { stroke: #000; stroke-width: 1.5; fill: none; }
  .vec-thin { stroke: #555; stroke-width: 1; fill: none; }
  .dashed { stroke: #555; stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
  .ftxt { font-family: 'Times New Roman', serif; font-style: italic; font-size: 14px; fill: #000; }
  .label { font-family: 'Hiragino Sans', sans-serif; font-size: 12px; fill: #000; }
  .pt { fill: #000; }
  .filled { fill: #ddd; stroke: #000; stroke-width: 1; }
  .filled-light { fill: #eee; stroke: #000; stroke-width: 1; }
  .right-angle { stroke: #000; stroke-width: 1; fill: none; }
</style>


<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="7" markerHeight="7" orient="auto">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
  </marker>
  <marker id="arrowgray" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="6" markerHeight="6" orient="auto">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
  </marker>
</defs>

<rect x="30" y="50" width="100" height="100" fill="#ddd" stroke="none"/>
<line x1="50.0" y1="140.0" x2="120.0" y2="140.0" class="vec" marker-end="url(#arrow)"/>
<line x1="50.0" y1="140.0" x2="80.0" y2="70.0" class="vec" marker-end="url(#arrow)"/>
<circle cx="50.0" cy="140.0" r="3" class="pt"/>
<circle cx="120.0" cy="140.0" r="3" class="pt"/>
<circle cx="80.0" cy="70.0" r="3" class="pt"/>
<text x="35.0" y="145.0" class="label">O</text>
<text x="123.0" y="145.0" class="label">A</text>
<text x="75.0" y="65.0" class="label">B</text>
<text x="30.0" y="190.0" class="label">①s,tが実数全体</text>
<text x="38.0" y="208.0" class="label">→ 全平面</text>
<line x1="274.0" y1="182.0" x2="186.0" y2="28.0" class="vec"/>
<line x1="180.0" y1="140.0" x2="250.0" y2="140.0" class="vec" marker-end="url(#arrow)"/>
<line x1="180.0" y1="140.0" x2="210.0" y2="70.0" class="vec" marker-end="url(#arrow)"/>
<circle cx="180.0" cy="140.0" r="3" class="pt"/>
<circle cx="250.0" cy="140.0" r="3" class="pt"/>
<circle cx="210.0" cy="70.0" r="3" class="pt"/>
<text x="165.0" y="145.0" class="label">O</text>
<text x="253.0" y="145.0" class="label">A</text>
<text x="205.0" y="65.0" class="label">B</text>
<text x="160.0" y="190.0" class="label">②s+t=1</text>
<text x="168.0" y="208.0" class="label">→ 直線AB</text>
<line x1="380" y1="140" x2="340" y2="70" stroke="#000" stroke-width="3"/>
<line x1="310.0" y1="140.0" x2="380.0" y2="140.0" class="vec" marker-end="url(#arrow)"/>
<line x1="310.0" y1="140.0" x2="340.0" y2="70.0" class="vec" marker-end="url(#arrow)"/>
<circle cx="310.0" cy="140.0" r="3" class="pt"/>
<circle cx="380.0" cy="140.0" r="3" class="pt"/>
<circle cx="340.0" cy="70.0" r="3" class="pt"/>
<text x="295.0" y="145.0" class="label">O</text>
<text x="383.0" y="145.0" class="label">A</text>
<text x="335.0" y="65.0" class="label">B</text>
<text x="290.0" y="190.0" class="label">③s+t=1,s≧0,t≧0</text>
<text x="298.0" y="208.0" class="label">→ 線分AB</text>
<polygon points="440,140 510,140 470,70" fill="#ddd" stroke="#000"/>
<line x1="440.0" y1="140.0" x2="510.0" y2="140.0" class="vec" marker-end="url(#arrow)"/>
<line x1="440.0" y1="140.0" x2="470.0" y2="70.0" class="vec" marker-end="url(#arrow)"/>
<circle cx="440.0" cy="140.0" r="3" class="pt"/>
<circle cx="510.0" cy="140.0" r="3" class="pt"/>
<circle cx="470.0" cy="70.0" r="3" class="pt"/>
<text x="425.0" y="145.0" class="label">O</text>
<text x="513.0" y="145.0" class="label">A</text>
<text x="465.0" y="65.0" class="label">B</text>
<text x="420.0" y="190.0" class="label">④s+t≦1,s≧0,t≧0</text>
<text x="428.0" y="208.0" class="label">→ △OAB周+内部</text>
</svg>