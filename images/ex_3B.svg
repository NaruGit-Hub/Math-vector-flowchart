<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">

<style>
  .axis { stroke: #000; stroke-width: 1; fill: none; }
  .vec  { stroke: #000; stroke-width: 1.5; fill: none; }
  .vec-thin { stroke: #555; stroke-width: 1; fill: none; }
  .dashed { stroke: #555; stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
  .ftxt { font-family: 'Times New Roman', serif; font-style: italic; font-size: 14px; fill: #000; }
  .label { font-family: 'Hiragino Sans', sans-serif; font-size: 12px; fill: #000; }
  .pt { fill: #000; }
  .filled { fill: #ddd; stroke: #000; stroke-width: 1; }
  .filled-light { fill: #eee; stroke: #000; stroke-width: 1; }
  .right-angle { stroke: #000; stroke-width: 1; fill: none; }
</style>


<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="7" markerHeight="7" orient="auto">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
  </marker>
  <marker id="arrowgray" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="6" markerHeight="6" orient="auto">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
  </marker>
</defs>

<polygon points="100.0,110.0 300.0,110.0 340.0,40.0 140.0,40.0" fill="#ddd" stroke="#000" stroke-width="1.5"/>
<line x1="60.0" y1="180.0" x2="260.0" y2="180.0" class="vec" marker-end="url(#arrow)"/>
<line x1="60.0" y1="180.0" x2="140.0" y2="40.0" class="vec" marker-end="url(#arrow)"/>
<line x1="100.0" y1="110.0" x2="300.0" y2="110.0" class="dashed"/>
<circle cx="60.0" cy="180.0" r="3" class="pt"/>
<circle cx="260.0" cy="180.0" r="3" class="pt"/>
<circle cx="140.0" cy="40.0" r="3" class="pt"/>
<circle cx="100.0" cy="110.0" r="2.5" class="pt"/>
<circle cx="300.0" cy="110.0" r="2.5" class="pt"/>
<circle cx="340.0" cy="40.0" r="2.5" class="pt"/>
<text x="45.0" y="185.0" class="label">O</text>
<text x="265.0" y="185.0" class="label">A</text>
<text x="125.0" y="35.0" class="label">B</text>
<text x="68.0" y="113.0" class="label">½B</text>
<text x="343.0" y="37.0" class="label">A+B</text>
<text x="60.0" y="210.0" class="label">P の動く範囲（網掛け部）</text>
</svg>